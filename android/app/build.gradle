plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.bodybth.mydashboard"
    compileSdk 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.bodybth.mydashboard"
        minSdk 21
        targetSdk 34
        // CI overwrites both values with YYMMDDRRR (e.g. 250227029).
        // Seed is 250227001 which is already > any run-number-based versionCode (max was ~30).
        // This guarantees every new CI build installs as an update over anything previously installed.
        versionCode 250227001
        versionName "250227001"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
